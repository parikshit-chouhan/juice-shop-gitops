apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: juice-shop
  namespace: argocd

spec:

  project: default

  source:
    repoURL:https://github.com/parikshit-chouhan/juice-shop-gitops.git

    targetRevision: HEAD

    path: .

  destination:
    server: https://kubernetes.default.svc

    namespace: juice-shop

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
