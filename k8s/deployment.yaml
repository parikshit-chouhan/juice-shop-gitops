---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop
  namespace: juice-shop

spec:
  replicas: 2

  selector:
    matchLabels:
      app: juice-shop

  template:
    metadata:
      labels:
        app: juice-shop

    spec:
      containers:
        - name: juice-shop
          image: itsparikshit/juice-shop:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
